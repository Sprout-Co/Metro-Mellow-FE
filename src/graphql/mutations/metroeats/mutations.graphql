mutation CreateMealOrder($input: CreateMealOrderInput!) {
  createMealOrder(input: $input) {
    id
    customer {
      id
      email
      firstName
      lastName
    }
    address
    items {
      meal {
        id
        name
        description
        pricePlate
        priceBowl
        category
      }
      quantity
    }
    totalPrice
    paymentStatus
    createdAt
    updatedAt
  }
}
