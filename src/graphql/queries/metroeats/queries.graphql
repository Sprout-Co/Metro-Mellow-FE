# All active meals, optionally filtered by category
query GetMeals($category: MealCategory) {
  meals(category: $category) {
    id
    name
    description
    pricePlate
    priceBowl
    availableStyles
    category
    image
    extras {
      id
      name
      price
    }
    isActive
    createdAt
    updatedAt
  }
}

# Current user's meal orders (requires auth)
query GetMealOrders {
  mealOrders {
    id
    customer {
      id
      email
      firstName
      lastName
      phone
    }
    address {
      id
      street
      city
      state
      zipCode
      country
      isDefault
      label
      serviceArea
    }
    items {
      meal {
        id
        name
        description
        pricePlate
        priceBowl
        category
        availableStyles
        extras {
          id
          name
          price
        }
      }
      quantity
      style
      extras {
        id
        name
        price
      }
    }
    totalPrice
    paymentStatus
    createdAt
    updatedAt
    mealOrderStatus
  }
}
